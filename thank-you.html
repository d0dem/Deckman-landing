      background: #1b4332;

    .card {

    }

    .logo-wrap {

    }

    .logo-img {
      width: 90px;
      height: auto;

      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .checkmark {
      width: 72px;

      background: rgba(255,255,255,0.12);

      align-items: center;
      justify-content: center;
      margin: 0 auto 36px;
    }

    .divider {
      width: 48px;
      height: 3px;

      line-height: 1.65;

    .videos-label {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 20px;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .videos-grid { grid-template-columns: 1fr; }
    }

    .video-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      border-radius: 10px;
      overflow: hidden;
      background: rgba(0,0,0,0.3);
    }

    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
